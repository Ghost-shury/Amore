<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Una dolce confessione d'amore interattiva con animazioni e musica romantica.">
    <meta name="theme-color" content="#ff3366">
    
    <!-- Open Graph per condivisione social -->
    <meta property="og:title" content="Per te, Orsacchiotta 💖">
    <meta property="og:description" content="Una dolce confessione d'amore interattiva con animazioni e musica romantica.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://emojipedia-us.s3.amazonaws.com/source/microsoft-teams/337/beating-heart_1f493.png">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Per te, Orsacchiotta 💖">
    <meta name="twitter:description" content="Una dolce confessione d'amore interattiva.">
    
    <title>Per Orsacchiotta ❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe6f0 0%, #ffccde 50%, #ffb3d9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            z-index: 2;
            padding: 20px;
            max-width: 500px;
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #ff3366;
            font-size: 2.5rem;
            margin-bottom: 40px;
            line-height: 1.4;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        button {
            font-size: 1.2rem;
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(-1px);
        }

        .start {
            background: linear-gradient(135deg, #ff3366 0%, #ff1744 100%);
            color: white;
            font-size: 1.3rem;
            padding: 18px 50px;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
        }

        .start:hover {
            background: linear-gradient(135deg, #ff1744 0%, #d60047 100%);
        }

        .si {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            flex: 1;
            min-width: 120px;
        }

        .si:hover {
            background: linear-gradient(135deg, #45a049 0%, #3d8b40 100%);
        }

        .no {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            color: white;
            flex: 1;
            min-width: 120px;
        }

        .no:hover {
            background: linear-gradient(135deg, #d32f2f 0%, #b71c1c 100%);
        }

        .message {
            font-size: 1.8rem;
            color: #ff1744;
            margin-bottom: 20px;
            animation: heartbeat 0.6s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.1);
            }
            50% {
                transform: scale(1);
            }
        }

        /* Cuori che cadono */
        .cuore {
            position: fixed;
            color: red;
            animation: caduta linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes caduta {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            button {
                font-size: 1rem;
                padding: 12px 25px;
            }

            .message {
                font-size: 1.4rem;
            }

            .button-container {
                gap: 10px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Per te, Orsacchiotta 💖</h1>
    <button class="start" onclick="inizia()">Clicca qui ❤️</button>
</div>

<audio id="musica" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<script>
function inizia() {
    document.getElementById("musica").play();

    document.body.querySelector('.container').innerHTML = `
        <h1>Orsacchiotta 🧸❤️</h1>
        <div class="message">Ti amo tantissimo... Ricambi?</div>
        <div class="button-container">
            <button class="si" onclick="rispostaSi()">Sì ❤️</button>
            <button class="no" id="noBtn" onclick="rispostaNo()">No 😢</button>
        </div>
    `;

    setInterval(creaCuore, 300);
}

function rispostaSi() {
    document.body.querySelector('.container').innerHTML = `
        <h1>💖 Orsacchiotta 💖</h1>
        <div class="message">Per me sei la mia vita e sei tutto per me</div>
    `;
    celebrazione();
}

function rispostaNo() {
    document.body.querySelector('.container').innerHTML = `
        <h1>Sei sicura Orsacchiotta? 😏</h1>
        <div class="message">Ti amo troppo... Ricambi?</div>
        <div class="button-container">
            <button class="si" onclick="rispostaSi()">Sì ❤️</button>
        </div>
    `;
}

function creaCuore() {
    const cuore = document.createElement("div");
    cuore.classList.add("cuore");
    cuore.innerHTML = "❤️";

    cuore.style.left = Math.random() * 100 + "vw";
    cuore.style.animationDuration = (Math.random() * 3 + 2) + "s";
    cuore.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(cuore);

    setTimeout(() => {
        cuore.remove();
    }, 5000);
}

function celebrazione() {
    for (let i = 0; i < 30; i++) {
        setTimeout(() => {
            const cuore = document.createElement("div");
            cuore.classList.add("cuore");
            cuore.innerHTML = "❤️";
            cuore.style.left = Math.random() * 100 + "vw";
            cuore.style.animationDuration = (Math.random() * 2 + 1) + "s";
            cuore.style.fontSize = (Math.random() * 30 + 15) + "px";
            document.body.appendChild(cuore);

            setTimeout(() => {
                cuore.remove();
            }, 3000);
        }, i * 50);
    }
}
</script>

</body>
</html>
