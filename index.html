<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Per te amore ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom, #ffe6f0, #ffcce0);
    text-align: center;
}

h1 { color: #ff3366; }

button {
    padding: 15px 25px;
    margin: 15px;
    font-size: 18px;
    border: none;
    border-radius: 15px;
    cursor: pointer;
}

.btn1 { background: #ff4d79; color: white; }
.btn2 { background: #4CAF50; color: white; }

#contenuto {
    padding: 20px;
    max-width: 800px;
    margin: auto;
}

.lettera {
    background: white;
    padding: 20px;
    border-radius: 15px;
    text-align: left;
    line-height: 1.6;
}

img {
    max-width: 90%;
    border-radius: 15px;
    margin: 10px;
}

/* cuori */
.cuore {
    position: fixed;
    top: -10px;
    color: red;
    animation: caduta linear infinite;
}

@keyframes caduta {
    to { transform: translateY(110vh); }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h1>Inserisci la password 💖</h1>
    <input type="password" id="password" placeholder="Password">
    <br><br>
    <button onclick="controlla()">Entra ❤️</button>
</div>

<!-- CONTENUTO -->
<div id="app" style="display:none;">
    <h1>Per te amore mio ❤️</h1>

    <button class="btn1" onclick="mostraTesto()">📜 Testo</button>
    <button class="btn2" onclick="mostraFoto()">📸 Foto ricordo</button>

    <div id="contenuto"></div>

    <audio autoplay loop>
        <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
    </audio>
</div>

<script>

// PASSWORD
function controlla() {
    let pass = document.getElementById("password").value;

    if(pass === "orsacchiotta") {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";
    } else {
        alert("Password sbagliata 😢");
    }
}

// TESTO COMPLETO
function mostraTesto() {
    document.getElementById("contenuto").innerHTML = `
    <div class="lettera">
    <p>Amore mio,</p>

    <p>a volte mi fermo e penso a noi due. Mi rendo conto di quanto sei importante per me. Non so spiegare bene cosa provo, ma so che è qualcosa di speciale. Voglio dirtelo ogni giorno, perché te lo meriti. Da quando sei entrata nella mia vita, tutto è cambiato. Le cose semplici hanno un significato nuovo. È come se avessi portato una luce dentro di me, una calma che non sapevo di cercare.</p>

    <p>La cosa che amo di più di te è la tua sincerità. Non sei perfetta, ma sei te stessa. Amo il tuo modo di essere, anche quando sei arrabbiata o testarda. È quello che ti rende unica. Non cambierei nulla di te, nemmeno un piccolo dettaglio.</p>

    <p>Mi piace quando sorridi, perché mi fai stare bene anche nei momenti difficili. Mi piace come mi fai sentire, come se fossi importante per te. Non dimenticherò mai questo.</p>

    <p>Con te mi sento a casa, non importa dove siamo o cosa stiamo facendo. Anche il silenzio è speciale, anche stare insieme senza fare niente è bello.</p>

    <p>A volte mi chiedo come sia possibile essere così fortunato da averti. Non so, ma so che ti sceglierei sempre. Voglio esserci per te, nei giorni belli e in quelli difficili. Voglio essere la persona che ti fa sorridere, quella su cui puoi contare sempre.</p>

    <p>Tu non sei solo la mia ragazza, sei molto di più. Sei il mio pensiero fisso, il mio equilibrio, il mio posto sicuro. Sei quella persona che ha cambiato tutto.</p>

    <p>Voglio che tu sappia sempre questo: ti amo in un modo semplice, ma profondo. Ti amo per come sei, ogni giorno di più. Sei la mia felicità, la mia forza, la mia dolcezza.</p>

    <p>E non smetterò mai di dimostrartelo. ❤️</p>
    </div>
    `;
}

// FOTO CON SALVATAGGIO
function mostraFoto() {
    document.getElementById("contenuto").innerHTML = `
        <h2>I nostri ricordi 📸</h2>
        <input type="file" accept="image/*" onchange="salvaFoto(event)">
        <div id="galleria"></div>
    `;
    caricaFoto();
}

function salvaFoto(event) {
    const file = event.target.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        let immagini = JSON.parse(localStorage.getItem("foto")) || [];
        immagini.push(e.target.result);
        localStorage.setItem("foto", JSON.stringify(immagini));
        caricaFoto();
    }

    reader.readAsDataURL(file);
}

function caricaFoto() {
    const galleria = document.getElementById("galleria");
    galleria.innerHTML = "";

    let immagini = JSON.parse(localStorage.getItem("foto")) || [];

    immagini.forEach(src => {
        const img = document.createElement("img");
        img.src = src;
        galleria.appendChild(img);
    });
}

// CUORI
function creaCuore() {
    const cuore = document.createElement("div");
    cuore.classList.add("cuore");
    cuore.innerHTML = "❤️";

    cuore.style.left = Math.random() * 100 + "vw";
    cuore.style.animationDuration = (Math.random() * 3 + 2) + "s";
    cuore.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(cuore);

    setTimeout(() => cuore.remove(), 5000);
}

setInterval(creaCuore, 300);

</script>

</body>
</html>
